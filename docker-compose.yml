services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: opencut
      POSTGRES_PASSWORD: opencut
      POSTGRES_DB: opencut
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencut"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_TOKEN: example_token
      SRH_CONNECTION_STRING: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # --- AI Services ---

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ai-backend:
    build:
      context: ./services/ai-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8420:8420"
    environment:
      - OPENCUTAI_OLLAMA_URL=http://ollama:11434
      - OPENCUTAI_PORT=8420
      - OPENCUTAI_CORS_ORIGINS=["http://localhost:3000","http://localhost:3100","http://localhost:5173"]
      # LLM model for Ollama. Kimi K2 options:
      #   kimi-k2:latest (Q3, ~1.4GB), kimi-k2:q4_K_M (Q4, ~3GB), kimi-k2:q5_K_M (Q5, ~7GB)
      - OPENCUTAI_OLLAMA_DEFAULT_MODEL=${OLLAMA_DEFAULT_MODEL:-llama3.2:1b}
      - OPENCUTAI_OLLAMA_TIMEOUT=300
      - OPENCUTAI_WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      - OPENCUTAI_WHISPER_DEVICE=cpu
      - OPENCUTAI_WHISPER_SERVICE_URL=http://whisper-service:8421
      - OPENCUTAI_TTS_SERVICE_URL=http://tts-service:8422
      - OPENCUTAI_IMAGE_SERVICE_URL=http://image-service:8423
      - OPENCUTAI_SPEAKER_SERVICE_URL=http://speaker-service:8424
      - OPENCUTAI_FACE_SERVICE_URL=http://face-service:8425
      - OPENCUTAI_TURBOQUANT_SERVICE_URL=http://turboquant-service:8430
      - OPENCUTAI_CLIP_SERVICE_URL=http://clip-service:8426
      - OPENCUTAI_AI_MEMORY_BUDGET=${AI_MEMORY_BUDGET:-auto}
      - OPENCUTAI_AI_MODEL_TIER=${AI_MODEL_TIER:-auto}
      - OPENCUTAI_KV_CACHE_BITS=${KV_CACHE_BITS:-4}
      - OPENCUTAI_AI_LLM_BACKEND=${AI_LLM_BACKEND:-auto}
      - OPENCUTAI_SARVAM_API_KEY=${SARVAM_API_KEY:-}
    volumes:
      - ai_models:/app/models
      - ai_generated:/app/generated
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8420/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  whisper-service:
    build:
      context: ./services/whisper-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8421:8421"
    environment:
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
    volumes:
      - whisper_models:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8421/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  tts-service:
    build:
      context: ./services/tts-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8422:8422"
    volumes:
      - tts_models:/root/.cache
    environment:
      - TTS_AUTOLOAD=true
    deploy:
      resources:
        limits:
          memory: 6g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8422/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  image-service:
    build:
      context: ./services/image-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8423:8423"
    volumes:
      - image_models:/root/.cache
      - image_generated:/app/generated
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8423/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  speaker-service:
    build:
      context: ./services/speaker-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8424:8424"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - speaker_models:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8424/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  face-service:
    build:
      context: ./services/face-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8425:8425"
    volumes:
      - face_models:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8425/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  clip-service:
    build:
      context: ./services/clip-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8426:8426"
    environment:
      # CLIP model defaults. Override via .env if a larger model is desired
      # (e.g. CLIP_MODEL_NAME=ViT-L-14, CLIP_PRETRAINED=laion2b_s32b_b82k).
      - CLIP_MODEL_NAME=${CLIP_MODEL_NAME:-ViT-B-32}
      - CLIP_PRETRAINED=${CLIP_PRETRAINED:-laion2b_s34b_b79k}
      - DEVICE=${OPENCUTAI_AI_COMPUTE_MODE:-auto}
    volumes:
      - clip_models:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8426/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      # First start must download ~340MB of CLIP weights.
      start_period: 60s

  turboquant-service:
    build:
      context: ./services/turboquant-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8430:8430"
    environment:
      # HuggingFace model for TurboQuant inference. Kimi options:
      #   moonshotai/Kimi-VL-A3B-Instruct  (~2.5GB 4-bit, Standard tier)
      #   moonshotai/Kimi-K2-Instruct       (~22GB 4-bit, Pro / GPU tier)
      - MODEL_NAME=${TURBOQUANT_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - KV_CACHE_BITS=${KV_CACHE_BITS:-4}
      - MAX_CONTEXT_LENGTH=8192
      # Compute mode is driven by the user-facing toggle in Settings → AI Optimization.
      # The ai-backend writes OPENCUTAI_AI_COMPUTE_MODE to .env; this line pulls it
      # through so `auto | cpu | cuda` reaches the turboquant-service at container start.
      - DEVICE=${OPENCUTAI_AI_COMPUTE_MODE:-auto}
    volumes:
      - turboquant_models:/app/models
    deploy:
      resources:
        limits:
          memory: 8g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8430/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --- Web App ---

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        - FREESOUND_CLIENT_ID=${FREESOUND_CLIENT_ID}
        - FREESOUND_API_KEY=${FREESOUND_API_KEY}
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://opencut:opencut@db:5432/opencut
      - BETTER_AUTH_SECRET=your-production-secret-key-here
      - UPSTASH_REDIS_REST_URL=http://serverless-redis-http:80
      - UPSTASH_REDIS_REST_TOKEN=example_token
      - NEXT_PUBLIC_SITE_URL=http://localhost:3100
      - NEXT_PUBLIC_MARBLE_API_URL=https://api.marblecms.com
      - NEXT_PUBLIC_AI_BACKEND_URL=http://localhost:8420
      - MARBLE_WORKSPACE_KEY=${MARBLE_WORKSPACE_KEY:-placeholder}
      - FREESOUND_CLIENT_ID=${FREESOUND_CLIENT_ID}
      - FREESOUND_API_KEY=${FREESOUND_API_KEY}
      # Transcription (Optional - leave blank to disable auto-captions)
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-placeholder}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-placeholder}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-placeholder}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-opencut-transcription}
      - MODAL_TRANSCRIPTION_URL=${MODAL_TRANSCRIPTION_URL:-http://localhost:0}
      - NEXT_PUBLIC_WHISPER_SERVICE_URL=http://localhost:8421
      - NEXT_PUBLIC_TTS_SERVICE_URL=http://localhost:8422
      - NEXT_PUBLIC_IMAGE_SERVICE_URL=http://localhost:8423
    depends_on:
      db:
        condition: service_healthy
      serverless-redis-http:
        condition: service_healthy
      ai-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  ollama_data:
  ai_models:
  ai_generated:
  whisper_models:
  tts_models:
  image_models:
  speaker_models:
  face_models:
  turboquant_models:
  image_generated:
  clip_models:

networks:
  default:
    name: opencut-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      com.docker.network.bridge.enable_dns: "true"
