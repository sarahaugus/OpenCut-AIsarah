services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: opencut
      POSTGRES_PASSWORD: opencut
      POSTGRES_DB: opencut
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencut"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_TOKEN: example_token
      SRH_CONNECTION_STRING: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # --- AI Backend (lightweight, no heavy AI models) ---

  ai-backend:
    build:
      context: ./services/ai-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8420:8420"
    environment:
      - OPENCUTAI_PORT=8420
      - OPENCUTAI_CORS_ORIGINS=["http://localhost:3000","http://localhost:3100","http://localhost:5173","http://144.91.91.227:3101"]
      - OPENCUTAI_SARVAM_API_KEY=${SARVAM_API_KEY:-}
    volumes:
      - ai_generated:/app/generated
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8420/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # --- Web App ---

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        - FREESOUND_CLIENT_ID=${FREESOUND_CLIENT_ID}
        - FREESOUND_API_KEY=${FREESOUND_API_KEY}
    restart: unless-stopped
    ports:
      # CHANGED: host port 3100 -> 3101 (3100 was taken). Left side only.
      - "3101:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://opencut:opencut@db:5432/opencut
      - BETTER_AUTH_SECRET=your-production-secret-key-here
      - UPSTASH_REDIS_REST_URL=http://serverless-redis-http:80
      - UPSTASH_REDIS_REST_TOKEN=example_token
      - NEXT_PUBLIC_SITE_URL=http://144.91.91.227:3101
      - NEXT_PUBLIC_MARBLE_API_URL=https://api.marblecms.com
      - NEXT_PUBLIC_AI_BACKEND_URL=http://144.91.91.227:8420
      - MARBLE_WORKSPACE_KEY=${MARBLE_WORKSPACE_KEY:-placeholder}
      - FREESOUND_CLIENT_ID=${FREESOUND_CLIENT_ID}
      - FREESOUND_API_KEY=${FREESOUND_API_KEY}
      # Transcription (Optional - leave blank to disable auto-captions)
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-placeholder}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-placeholder}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-placeholder}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-opencut-transcription}
      - MODAL_TRANSCRIPTION_URL=${MODAL_TRANSCRIPTION_URL:-http://localhost:0}
      - NEXT_PUBLIC_WHISPER_SERVICE_URL=http://144.91.91.227:8421
      - NEXT_PUBLIC_TTS_SERVICE_URL=http://144.91.91.227:8422
      - NEXT_PUBLIC_IMAGE_SERVICE_URL=http://144.91.91.227:8423
    depends_on:
      db:
        condition: service_healthy
      serverless-redis-http:
        condition: service_healthy
      ai-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  ai_generated:

networks:
  default:
    name: opencut-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      com.docker.network.bridge.enable_dns: "true"
